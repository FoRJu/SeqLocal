# Main bioconda toolchain for the ONT sequencing-service pipeline.
# CRO deliverable: every tool is pinned exactly (ADR-0002 in
# .claude/memory/decisions.md). Versions verified June 2026 against GitHub
# releases + the bioconda anaconda.org API.
#
# Create:  mamba env create -f environment.yml
# Update:  mamba env update -f environment.yml --prune
#
# NOTE: Medaka is deliberately NOT here — it lives in environment-medaka.yml
#       (ADR-0003: ONT-unsupported bioconda build + bundled samtools/minimap2
#       collide with the pins below). Dorado and Nextflow are not conda tools;
#       install them via bin/install_dorado.sh and bin/install_nextflow.sh.
name: ont-tools
channels:
  # Strict priority, conda-forge above bioconda, no `defaults` (ADR-0004).
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  # Assembly / consensus
  - autocycler=0.6.2
  # Reorientation of circular contigs
  - dnaapler=1.3.0
  # Read manipulation / QC
  - seqkit=2.13.0
  # Alignment
  - minimap2=2.31
  # SAM/BAM + variant tooling (share HTSlib 1.23.1 — keep lockstep)
  - samtools=1.23.1
  - bcftools=1.23.1
  # Subsampling + length/quality filtering
  - rasusa=4.1.0
  - filtlong=0.3.1
  # Sequence I/O — the canonical ABIF reader for the AB1 round-trip check (M2,
  # ADR-0008) and amplicon-tier parsing (M3). conda-forge build (bioconda is stale).
  - biopython=1.87
